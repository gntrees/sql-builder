const totalDays = 30;

let data = JSON.parse(localStorage.getItem("trackerV3")) || {
  days: Array(totalDays).fill(false),
  notes: ""
};

const checklistEl = document.getElementById("checklist");
const progressEl = document.getElementById("progress");
const progressText = document.getElementById("progressText");
const todayTaskEl = document.getElementById("todayTask");
const notesEl = document.getElementById("notes");

function render(){
  checklistEl.innerHTML = "";

  data.days.forEach((d,i)=>{
    checklistEl.innerHTML += `
      <div class="day">
        <input type="checkbox" ${d?"checked":""} onchange="toggle(${i})">
        Day ${i+1}
      </div>
    `;
  });

  updateProgress();
  showToday();
}

function toggle(i){
  data.days[i]=!data.days[i];
  save();
  render();
}

function updateProgress(){
  const done = data.days.filter(Boolean).length;
  progressEl.style.width = (done/30)*100+"%";
  progressText.innerText = done + "/30 days";
}

function showToday(){
  const idx = data.days.findIndex(d=>!d);
  const index = idx===-1?29:idx;
  todayTaskEl.innerHTML = tasks[index].content;
}

function save(){
  data.notes = notesEl.value;
  localStorage.setItem("trackerV3", JSON.stringify(data));
}

function resetAll(){
  if(confirm("Reset?")){
    data = {days:Array(30).fill(false),notes:""};
    save();
    render();
  }
}

notesEl.value = data.notes;
notesEl.addEventListener("input",save);

render();
